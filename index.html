<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>

<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins',sans-serif; }

body {
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  background: radial-gradient(circle at 30% 30%, #0d0d0d, #050505 70%);
  color:white;
  padding:40px 0;
}

#particles-js {
  position:fixed;
  width:100%;
  height:100%;
  z-index:0;
}

.container {
  z-index:1;
  text-align:center;
  padding:40px;
  border-radius:20px;
  background:rgba(0,0,0,0.6);
  border:1px solid rgba(0,255,136,0.2);
  box-shadow:0 0 40px rgba(0,255,136,0.2);
  max-width:500px;
}

.avatar {
  width:100px;
  border-radius:50%;
  border:3px solid #00ff88;
  margin-bottom:15px;
  animation:glow 2s infinite alternate;
}

@keyframes glow {
  from { box-shadow:0 0 10px #00ff88; }
  to { box-shadow:0 0 30px #00ff88, 0 0 60px #ff7a00; }
}

.links a {
  display:block;
  margin:12px 0;
  padding:14px;
  border-radius:10px;
  text-decoration:none;
  color:white;
  background:linear-gradient(90deg,#00ff88,#ff7a00);
  transition:0.3s;
}

.links a:hover {
  transform:scale(1.05);
}
</style>
</head>

<body>

<div id="particles-js"></div>

<div class="container">
  <img src="https://tr.rbxcdn.com/30DAY-AvatarHeadshot-765855B8CACB6FD692B7CBB3BE20EC36-Png/150/150/AvatarHeadshot/Webp/noFilter" class="avatar">

  <h1>Portfolio</h1>

  <p style="margin:15px 0; opacity:0.8;">
    Advanced developer specializing in systems, AI, and web integration.
  </p>

  <div class="links">
    <a href="projects.html">🚀 Projects</a>
    <a href="videos.html">🎬 Showcases</a>
    <a href="capabilities.html">⚙️ Capabilities</a>
  </div>
</div>

<script>
particlesJS("particles-js", {
  particles: {
    number: { value: 60 },
    size: { value: 3 },
    move: { speed: 1 },
    line_linked: { enable: true }
  }
});
</script>

</body>
</html>
